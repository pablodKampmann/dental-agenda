name: CI

on:
  pull_request:
    branches: [dev, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # actualizado de v3 a v4

      - uses: actions/setup-node@v4
        # actualizado de v3 a v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build